# /etc/nginx/sites-available/fsync
#
# Reverse-proxies wss://fsync.aramkor.com/ws -> the localhost-only hub on :8765.
# After installing this, run:  sudo certbot --nginx -d fsync.aramkor.com
# Certbot rewrites this to add the 443/SSL block and an 80->443 redirect.

server {
    listen 80;
    server_name fsync.aramkor.com;

    location / {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;   # keep idle persistent websockets alive (24h)
        proxy_send_timeout 86400;
    }
}
